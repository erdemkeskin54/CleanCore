services:
  postgres:
    image: postgres:16-alpine
    container_name: cleancore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cleancore_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - cleancore-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cleancore_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cleancore-pg-data:
